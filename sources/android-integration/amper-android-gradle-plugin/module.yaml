product: jvm/lib

description: A gradle plugin to handle Android builds that are delegated from Amper.

apply:
  - ../../common.module-template.yaml
  - ../../used-in-gradle.module-template.yaml

dependencies:
  - ../amper-android-gradle-api
  - ../amper-android-sdk-detector
  - ../../frontend-api
  - ../../frontend/schema
  - ../../libraries/stdlib-extended
  - $libs.android.gradle.plugin
  - $libs.google.services.gradle.plugin: runtime-only
  - $libs.gradle.api: compile-only

settings:
  jvm:
    # Used in Android Gradle builds (max 17), but common template sets it to 21, so we take the lowest version 17
    release: 17
  kotlin:
    serialization: json
  publishing:
    enabled: true
    group: org.jetbrains.amper.android.settings.plugin
    name: org.jetbrains.amper.android.settings.plugin.gradle.plugin
