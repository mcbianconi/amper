product: jvm/lib

description: JUnit listeners used by Amper test execution.

apply:
  - ../common.module-template.yaml
  - ../used-in-user-tests.module-template.yaml

dependencies:
  - $libs.junit5.platform.engine: compile-only
  - $libs.junit5.platform.launcher: compile-only
  - $libs.mordant
  - $libs.teamcity.serviceMessages

settings:
  jvm:
    # Used in user tests (max 11), but common template sets it to 21, so we take the lowest version 11
    release: 11
