product: jvm/app

plugins:
  distribution-plugin:
    enabled: true
    someInt: 42
    extraNamedClasspaths:
      "core": [ ../core ]
      "lib": [ ../lib ]
      "kotlin-poet": [ "com.squareup:kotlinpoet:2.2.0" ]
      "from-catalog":
        - $kotlin.reflect
      "compile":
        dependencies: [ . ]
        scope: compile
      "combined" :
        dependencies:
         - $kotlin.reflect
         - "com.squareup:kotlinpoet:2.2.0"
         - ../lib
        scope: runtime

settings:
  kotlin:
    version: 2.2.10

dependencies:
  - ../lib: runtime-only