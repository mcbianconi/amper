
tasks:
  build:
    action: !com.example.distribution.buildDistribution
      baseClasspath: ${module.runtimeClasspath}
      settings: ${pluginSettings}
      distributionDir: ${taskOutputDir}
      baseJar:
        from: ${module.self}
      localProperties: ${project.rootDir}/local.properties
      someInt: ${settings.someInt} # to test cascade ref resolution with holes
      someInt2: ${build.action.someInt} # to test cascade ref resolution with holes even more
