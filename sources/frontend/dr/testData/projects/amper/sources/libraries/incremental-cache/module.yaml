product: jvm/lib

description: Incremental cache abstractions and utilities.

apply:
  - ../../dr.amper.common.module-template.yaml
  - ../../dr.amper.used-in-idea.module-template.yaml
  - ../../dr.amper.used-in-kotlin-notebook.module-template.yaml

dependencies:
  - ../concurrency
  - ../nio-filechannels
  - ../telemetry: exported # OpenTelemetry is in the API
  - $libs.kotlinx.coroutines.core
  - $libs.slf4j.api

test-dependencies:
  - $libs.slf4j.simple
  - $libs.system.stubs.jupiter

settings:
  jvm:
    # Used in IDEA (max 21) and Kotlin Notebook (max 11), so we take the lowest version 11
    release: 11
  kotlin:
    serialization: json
