product:
  type: lib
  platforms:
    - jvm
    - android
    - iosArm64
    - wasmJs

aliases:
  jvmAndAndroid: [ jvm, android ]
  nonAndroid: [ jvm, iosArm64, wasmJs ]
  jvmAndIos: [ jvm, iosArm64 ]

settings@nonAndroid:
  kotlin:
    # Shouldn't have a diagnostic because `jvmAndIos` is more specific and overrides the value that could conflict
    # with `jvmAndAndroid`.
    progressiveMode: false

settings@jvmAndAndroid:
  kotlin:
    progressiveMode: true

settings@jvmAndIos:
  kotlin:
    progressiveMode: true