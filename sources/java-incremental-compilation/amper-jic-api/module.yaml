product: jvm/lib

description: Model to communicate between Amper and the Java incremental compilation process.

apply:
  - ../../common.module-template.yaml
  - ../../used-in-jic.module-template.yaml

dependencies:
  - $kotlin.serialization.core
  - ../../libraries/serialization-extended

settings:
  jvm:
    # Used in JIC (max 16), but common template sets it to 21, so we take the lowest version 16
    release: 16
  kotlin:
    serialization: json
